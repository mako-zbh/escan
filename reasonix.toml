# Reasonix configuration.
# Resolution order: flag > ./reasonix.toml > ~/.config/reasonix/config.toml > built-in defaults.
# Secrets come from the environment via api_key_env; never put keys here.

config_version = 2   # schema marker for diagnostics; old versions may ignore it
default_model = "deepseek-flash"
# language      = "zh"   # ui/model language; empty = auto-detect from $LANG / $REASONIX_LANG

[agent]
# system_prompt = """..."""   # omit to use the built-in prompt for this version
# system_prompt_file = "prompts/system.md"   # overrides system_prompt when set
max_steps         = 0   # executor tool-call rounds; 0 = no limit
planner_max_steps = 12   # planner read-only tool-call rounds; 0 = no limit
temperature       = 0.0
auto_plan   = "off"   # off|on; off keeps plan mode manual
# auto_plan_classifier = "deepseek-flash"   # optional; only used for borderline tasks
soft_compact_ratio  = 0.5   # notice only; keeps cache-first prefix intact
compact_ratio       = 0.8   # try compacting when prompt reaches this fraction
compact_force_ratio = 0.9   # force compacting at this high-water mark
# planner_model = "mimo"   # optional: enable two-model collaboration
# subagent_model = "deepseek-pro"   # optional default for runAs=subagent skills
# subagent_models = { review = "deepseek-pro", security_review = "deepseek-pro" }   # per-skill overrides
# subagent_effort = "high"   # optional default effort for subagents
# subagent_efforts = { review = "max", task = "high" }   # per-tool/skill effort overrides
# output_style = "explanatory"   # explanatory | learning | concise | custom; empty = default

[tools]
enabled = []   # empty = all built-in tools
bash_timeout_seconds = 120   # foreground safety cap; set 0 for no tool-local cap

[codegraph]
enabled      = true   # built-in MCP server; off by default for first-run sessions
auto_install = true   # fetch the runtime when CodeGraph is enabled but missing
# path       = ""   # empty = cache, then PATH, then a bundle beside reasonix

[lsp]
enabled = true   # language server tools; servers launch lazily when used
# [lsp.servers.go]
# command = "gopls"
# args = []
# extensions = [".go"]

[skills]
# paths = ["~/my-skills", "../shared/skills"]   # extra custom skill roots
# excluded_paths = ["~/.agents/skills"]   # hide convention roots without deleting folders
# max_depth = 3   # nested scan depth; set 1 for legacy root-only discovery
# disabled_skills = ["review"]   # hide noisy or unwanted skills

[permissions]
# Per-call gating. mode = writer fallback when no rule matches: ask|allow|deny.
# Readers always default to allow. Precedence: deny > ask > allow > fallback.
# Rules are "Tool" or "Tool(specifier)"; e.g. Bash(go test:*), Edit(src/**).
mode  = "ask"
# deny = ["Bash(rm -rf*)", "Bash(git push*)"]   # hard-blocked in every mode
allow = ["bash=git log --oneline -10 --format=\"%h %s%n  Author: %an <%ae> (%ar)%n\"", "Bash(docker compose -p escan exec escan sh -c '\npython3 -c \"\nimport sys; sys.path.insert(0,\\\"/app\\\")\nfrom escan.database.connection import get_cursor\nwith get_cursor() as cur:\n    # 看最新的 scan_logs\n    cur.execute(\\\"SELECT id, task_id, step, level, message, created_at FROM scan_logs ORDER BY id DESC LIMIT 10\\\")\n    for r in cur.fetchall():\n        print(f\\\"  #{r[0]} [{r[3]}] step={r[2]} {r[4]}\\\")\n    # 看任务状态\n    cur.execute(\\\"SELECT task_id, status, current_step FROM scan_tasks ORDER BY started_at DESC LIMIT 3\\\")\n    for r in cur.fetchall():\n        print(f\\\"TASK {r[0][:8]}... status={r[1]} step={r[2]}\\\")\n\"\n')", "Bash(cd /Users/zbh/Documents/project/python/tools && python3 -c \"import ast; ast.parse(open('escan/web/sse.py').read()); print('OK')\" && BUILDX_CONFIG=/tmp/buildx docker compose -p escan build escan 2>&1 | tail -3 && docker compose -p escan up -d --force-recreate escan 2>&1 | tail -3)", "Bash(sleep 3 && docker compose -p escan exec escan sh -c '\npython3 -c \"\nimport sys; sys.path.insert(0,\\\"/app\\\")\nfrom escan.database.connection import get_cursor\nfrom escan.database.dao import get_scan_logs\nwith get_cursor() as cur:\n    logs = get_scan_logs(cur, \\\"ae67b116-5f88-4ab0-b3a3-798bd8efee3b\\\", 5, 0)\n    for l in reversed(logs):\n        print(f\\\"  [{l[\\\"level\\\"]}] {l[\\\"message\\\"]}\\\")\n    print(f\\\"total: {len(logs)}\\\")\n\"\n')", "Bash(curl -s -N --max-time 5 http://localhost:5050/api/scans/ae67b116-5f88-4ab0-b3a3-798bd8efee3b/logs/stream 2>&1 | head -20)", "Bash(curl -s --max-time 10 \"http://localhost:5050/api/scans/ae67b116-5f88-4ab0-b3a3-798bd8efee3b/logs?limit=5&offset=0\" 2>&1)", "Bash(timeout 5 curl -s -N \"http://localhost:5050/api/scans/ae67b116-5f88-4ab0-b3a3-798bd8efee3b/logs/stream\" 2>&1 | head -20)", "Bash(perl -e \"alarm 5; exec @ARGV\" curl -s -N \"http://localhost:5050/api/scans/ae67b116-5f88-4ab0-b3a3-798bd8efee3b/logs/stream\" 2>&1 | head -30 || true)", "Bash(perl -e \"alarm 5; exec @ARGV\" curl -s -N \"http://localhost:5050/api/scans/ae67b116-5f88-4ab0-b3a3-798bd8efee3b/logs/stream\" 2>&1 | head -20 || true)", "Bash(docker compose -p escan exec escan sh -c \"wc -l /app/output/pipeline/2026-06-09_07-33-57/nuclei_results.txt && head -5 /app/output/pipeline/2026-06-09_07-33-57/nuclei_results.txt\")", "Bash(docker compose -p escan exec escan sh -c '\npython3 -c \"\nimport sys; sys.path.insert(0,\\\"/app\\\")\nfrom escan.database.connection import get_cursor\nwith get_cursor() as cur:\n    cur.execute(\\\"SELECT id, level, message, created_at FROM scan_logs WHERE task_id = %s AND level != \\'INFO\\' ORDER BY id DESC LIMIT 10\\\", (\\\"ae67b116-5f88-4ab0-b3a3-798bd8efee3b\\\",))\n    for r in cur.fetchall():\n        print(f\\\"  #{r[0]} [{r[1]}] {r[2]}\\\")\n    cur.execute(\\\"SELECT status, current_step, step4_icp FROM scan_tasks WHERE task_id = %s\\\", (\\\"ae67b116-5f88-4ab0-b3a3-798bd8efee3b\\\",))\n    r = cur.fetchone()\n    print(f\\\"TASK status={r[0]} step={r[1]} icp_count={r[2]}\\\")\n    # 看 ICP 结果有多少\n    cur.execute(\\\"SELECT COUNT(*) FROM icp_results WHERE task_id = %s\\\", (\\\"ae67b116-5f88-4ab0-b3a3-798bd8efee3b\\\",))\n    print(f\\\"icp_results rows: {cur.fetchone()[0]}\\\")\n\"\n')", "Bash(docker compose -p escan exec -T escan sh -c \"cat > /tmp/check_icp.py << 'PYEOF'\nimport sys\nsys.path.insert(0,\\\"/app\\\")\nfrom escan.database.connection import get_cursor\ntid=\\\"ae67b116-5f88-4ab0-b3a3-798bd8efee3b\\\"\nwith get_cursor() as cur:\n    cur.execute(\\\"SELECT id, level, message FROM scan_logs WHERE task_id = %s ORDER BY id DESC LIMIT 3\\\", (tid,))\n    for r in cur.fetchall():\n        print(f\\\"  #{r[0]} [{r[1]}] {r[2]}\\\")\n    cur.execute(\\\"SELECT status, current_step, step4_icp FROM scan_tasks WHERE task_id = %s\\\", (tid,))\n    r = cur.fetchone()\n    print(f\\\"TASK status={r[0]} step={r[1]} icp_count={r[2]}\\\")\n    cur.execute(\\\"SELECT COUNT(*) FROM icp_results WHERE task_id = %s\\\", (tid,))\n    print(f\\\"icp_results: {cur.fetchone()[0]} rows\\\")\nPYEOF\npython3 /tmp/check_icp.py\")", "Bash(docker compose -p escan exec -T escan sh -c \"cat > /tmp/count_ips.py << 'PYEOF'\nimport sys, json, re\nsys.path.insert(0,\\\"/app\\\")\nfrom escan.utils.network import is_ipv4\n\noutdir = \\\"/app/output/pipeline/2026-06-09_07-33-57\\\"\nwith open(f\\\"{outdir}/nuclei_results.txt\\\") as f:\n    hosts = set()\n    for line in f:\n        line = line.strip()\n        if not line or not line.startswith(\\\"[\\\"):\n            continue\n        for prefix in (\\\"http://\\\", \\\"https://\\\"):\n            idx = line.find(prefix)\n            if idx != -1:\n                url_part = line[idx:]\n                from escan.utils.network import extract_host_port\n                r = extract_host_port(url_part)\n                if r:\n                    _, hostname, _ = r\n                    hosts.add(hostname)\n                break\n\nips = [h for h in hosts if is_ipv4(h)]\ndomains = [h for h in hosts if not is_ipv4(h)]\nprint(f\\\"Unique hosts: {len(hosts)} (IPs: {len(ips)}, Domains: {len(domains)})\\\")\nprint(f\\\"Estimated time at 5s/IP: {len(ips) * 5 / 60:.1f} minutes\\\")\nPYEOF\npython3 /tmp/count_ips.py\")", "Bash(docker compose -p escan exec -T escan sh -c \"python3 -c 'from escan.config import AIZHAN_COOKIE; print(\\\"AIZHAN_COOKIE set:\\\", bool(AIZHAN_COOKIE)); print(\\\"len:\\\", len(AIZHAN_COOKIE) if AIZHAN_COOKIE else 0)'\")", "Bash(cd /Users/zbh/Documents/project/python/tools && python3 -c \"import ast; ast.parse(open('escan/pipeline/orchestrator.py').read()); print('OK')\")", "Bash(cd /Users/zbh/Documents/project/python/tools && BUILDX_CONFIG=/tmp/buildx docker compose -p escan build escan 2>&1 | tail -3 && docker compose -p escan up -d --force-recreate escan 2>&1 | tail -3)", "Bash(cd /Users/zbh/Documents/project/python/tools && python3 -c \"import ast; ast.parse(open('escan/pipeline/orchestrator.py').read()); print('OK')\" && BUILDX_CONFIG=/tmp/buildx docker compose -p escan build escan 2>&1 | tail -3 && docker compose -p escan up -d --force-recreate escan 2>&1 | tail -3)", "explore", "Bash(cd /Users/zbh/Documents/project/python/tools && python3 -c \"import ast; ast.parse(open('escan/pipeline/orchestrator.py').read()); ast.parse(open('escan/pipeline/miit_icp.py').read()); print('OK')\")", "Bash(cd /Users/zbh/Documents/project/python/tools && git status --short escan/ scripts/ docker-compose.yml frontend/)", "Bash(cd /Users/zbh/Documents/project/python/tools && echo \"=== 最近修改的文件 ===\" && git diff --name-only escan/ scripts/ docker-compose.yml frontend/ && echo \"=== 上次构建时间 ===\" && docker images escan-escan --format '{{.CreatedAt}}')", "Bash(cd /Users/zbh/Documents/project/python/tools && echo \"=== 容器内 miit_icp.py 是否包含 icp_api ===\" && docker compose -p escan exec escan sh -c \"grep -c 'icp_api' /app/escan/pipeline/miit_icp.py\" && echo \"=== 容器内 orchestrator.py 是否包含 found_total ===\" && docker compose -p escan exec escan sh -c \"grep -c 'found_total' /app/escan/pipeline/orchestrator.py\")", "Bash(cd /Users/zbh/Documents/project/python/tools && docker compose -p escan down && sleep 2 && BUILDX_CONFIG=/tmp/buildx docker compose -p escan up -d 2>&1)", "Bash(docker compose -p escan exec -T escan sh -c \"python3 -c \\\"\nimport sys; sys.path.insert(0,'/app')\nfrom escan.database.connection import get_cursor\n\nwith get_cursor() as cur:\n    # 修正 step4_icp 为实际有备案数的值\n    cur.execute('''\n        UPDATE scan_tasks t SET step4_icp = (\n            SELECT COUNT(*) FROM icp_results r\n            WHERE r.task_id = t.task_id AND r.icp_number IS NOT NULL AND r.icp_number != ''\n        )\n        WHERE status = 'completed'\n    ''')\n    print(f'已更新 {cur.rowcount} 个任务的 step4_icp')\n\n    # 验证\n    cur.execute('SELECT task_id, step4_icp FROM scan_tasks ORDER BY started_at DESC LIMIT 3')\n    for r in cur.fetchall():\n        print(f'  T